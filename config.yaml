# =============================================================================
# Enterprise RAG System — 全局配置文件
# =============================================================================
# 技术决策说明:
# - 采用 Qdrant 而非 Pinecone: Qdrant 原生支持 sparse+dense 混合搜索，
#   避免引入 Elasticsearch 的运维复杂度，且 mmap 零拷贝对大规模向量有显著
#   性能优势。
# - embedding 后端: OpenAI / DeepSeek 共享 OpenAI Embeddings API（DeepSeek 暂未发布
#   官方 embedding，backend 切换仅决定 base_url 与 api_key 来源）。
# =============================================================================

# --------------------------------------------------------------------------
# 0. 全局路径
# --------------------------------------------------------------------------
paths:
  data_dir: "data/sample_docs"
  output_dir: "outputs"

# --------------------------------------------------------------------------
# 1. Embedding 模型配置
# --------------------------------------------------------------------------
# 决策依据: MTEB Retrieval 2026年4月 leaderboard
#   - text-embedding-3-small: 成本敏感场景默认值，$0.02/1M tokens
#   - text-embedding-3-large: 通用场景高质量，MTEB ~59，支持 Matryoshka 截断
# 权衡: DeepSeek 暂未发布官方 embedding API，deepseek backend 走 OpenAI 兼容协议
embedding:
  backend: "openai"           # 选项: openai | deepseek
  openai_model: "text-embedding-3-small"
  deepseek_model: "BAAI/bge-m3"  # DeepSeek 无官方 embedding，保留作为本地 fallback
  dimension: 1024
  batch_size: 100
  normalize: true
  # Contextual Retrieval: 每个 chunk embed 前 prepend 此长度的上下文摘要
  contextual_prefix_tokens: 80

# --------------------------------------------------------------------------
# 2. Chunking 分块策略配置
# --------------------------------------------------------------------------
# 决策说明:
# - 2026 FAANG 标准: 512 tokens (事实型) / 1024 tokens (分析型)
#   块间重叠 64-128 tokens 保留跨块语义
# - 最小块阈值 150 tokens: 低于此值的块过于碎片化，会破坏检索精度
chunking:
  strategy: "recursive"      # 唯一支持: recursive
  chunk_size: 512
  chunk_overlap: 64
  min_chunk_size: 150

# --------------------------------------------------------------------------
# 3. 向量数据库 (Qdrant) 配置
# --------------------------------------------------------------------------
# 决策说明:
# - Qdrant vs pgvector: Qdrant 支持 sparse vector (BM25) 原生混合搜索。
# - HNSW vs IVF: HNSW 是 2026 年生产环境绝对主流。
vector_db:
  provider: "qdrant"
  url: "http://localhost:6333"
  collection_name: "enterprise_rag"
  vector_size: 1024          # 需与 embedding.dimension 严格一致
  distance: "Cosine"
  # HNSW 索引参数
  hnsw:
    m: 16
    ef_construct: 128
  # Sparse vector (BM25) 配置 — 由 Qdrant 服务端计算
  sparse:
    enabled: true
    tokenizer: "default"     # BM25 分词器（Qdrant native）
  # 批量写入配置
  batch_size: 64
  # BM25 路径选择:
  #   - "qdrant_sparse": 使用 Qdrant native sparse vector (默认)
  # 避免双重 BM25 路径造成的 RRF 权重叠加问题。
  bm25_mode: "qdrant_sparse"

# --------------------------------------------------------------------------
# 4. Reranker 配置
# --------------------------------------------------------------------------
# 决策说明:
# - Cross-Encoder 将 query+doc 联合编码，捕获细粒度交互，是当前生产环境绝对主流方案。
# - Cohere Rerank 3.5: 2026 年企业默认值
# - BGE Reranker v2-m3: 开源自托管，需小 GPU，适合合规/成本敏感场景
# - 用户选择 keep_both: Cohere + BGE 双 provider
reranker:
  provider: "cohere"         # 选项: cohere | bge
  cohere_model: "rerank-3.5"
  bge_model: "BAAI/bge-reranker-v2-m3"
  top_k: 5
  candidate_size: 50

# --------------------------------------------------------------------------
# 5. LLM 生成模型配置
# --------------------------------------------------------------------------
# 决策说明:
# - 用户锁定 LLM: DeepSeek + OpenAI 二选一（Phase1-1.17 已删 Anthropic/Google backend）
# - DeepSeek: 兼容 OpenAI ChatCompletion 协议，成本约为 GPT-4 的 1/10-1/20
# - Router / Generator 分层: Router 轻量、Generator 主力
llm:
  # DeepSeek API 配置（DeepSeek provider 时使用）
  deepseek:
    api_key: ""
    base_url: "https://api.deepseek.com"
    models:
      chat: "deepseek-chat"
      coder: "deepseek-coder"

  # 生成模型
  generator:
    provider: "deepseek"     # 选项: openai | deepseek
    model: "deepseek-chat"
    max_tokens: 2048
    temperature: 0.3
  # 路由/分类模型（轻量）
  router:
    provider: "deepseek"
    model: "deepseek-chat"
    max_tokens: 256
    temperature: 0.1
  # Structured Output Schema
  output_schema:
    answer: "string"
    citations: "array[{doc_id, chunk_index, quote}]"
    confidence: "enum[high, medium, low, insufficient]"

# --------------------------------------------------------------------------
# 6. Hybrid Search 配置
# --------------------------------------------------------------------------
# 决策说明:
# - Dense + Sparse 是 2026 年 FAANG 标准组合。
# - RRF (Reciprocal Rank Fusion): k=60 是业界默认值。
hybrid_search:
  individual_top_k: 50
  rrf_k: 60
  # DynamicRRFFusion 总开关；false 则固定用 rrf_k=60
  dynamic_k_enabled: true
  # 按 query complexity 选 k 的覆盖映射；None 用代码默认
  # 默认值: {simple: 30, moderate: 60, complex: 90, beyond_kb: 60}
  k_by_complexity: null

# --------------------------------------------------------------------------
# 7. Agentic 编排配置
# --------------------------------------------------------------------------
# 决策说明:
# - Router + ReAct 两层递进是 2026 年主流方案。Plan-and-Execute / Memory Bank 已删除。
# - ReAct 循环的 max_iterations 限制是防止无限循环的标准工程实践。
agentic:
  complexity_threshold: 0.6
  react:
    max_iterations: 5
    early_stop_threshold: 0.85

# --------------------------------------------------------------------------
# 8. 语义缓存配置
# --------------------------------------------------------------------------
# 决策说明:
# - 语义缓存可节省 40-80% 的 LLM 调用成本，命中查询响应时间从数秒压缩到 ~50ms。
# - 相似度阈值 0.92 是 precision/cost 的经验最优值。
semantic_cache:
  enabled: true
  provider: "redis"          # 唯一支持: redis
  host: "localhost"
  port: 6379
  ttl_days: 7
  similarity_threshold: 0.92
  index_name: "semantic_cache"
  max_entries: 100000

# --------------------------------------------------------------------------
# 9. 评估配置 (RAGAS only — Online Evaluator / DeepEval 已删除)
# --------------------------------------------------------------------------
# 决策说明:
# - RAGAS 五指标是学术界和工业界共同认可的标准评估体系。
# - 阈值设定 (≥0.85/0.75/0.70/0.70/0.80) 是 2026 年生产环境经验值。
evaluation:
  thresholds:
    faithfulness: 0.85
    answer_relevancy: 0.75
    context_precision: 0.70
    context_recall: 0.70
    answer_correctness: 0.80
  test_set:
    min_size: 30
    categories:
      - simple
      - moderate
      - difficult
  ci:
    fail_on_regression: true
    regression_threshold: 0.05

# --------------------------------------------------------------------------
# 10. 日志与可观测性配置
# --------------------------------------------------------------------------
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  file: "logs/rag_system.log"
  trace:
    enabled: true
    log_retrieval_scores: true
    log_citation_mapping: true
