name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (E/F/I rules)
        run: ruff check backend/ --select=E,F,I

      - name: Run ruff (format check)
        run: ruff format --check backend/

  test:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/readyz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      QDRANT_URL: http://localhost:6333
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=50 \
            -v

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  build:
    name: Build Docker Images
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -f docker/backend.Dockerfile -t rag-backend:ci .

      - name: Build frontend image
        run: docker build -f docker/frontend.Dockerfile -t rag-frontend:ci .

  eval_diff_gate:
    name: Eval Diff Gate (RAGAS regression check)
    needs: test
    runs-on: ubuntu-latest
    # P2 阶段: PR 上的 eval diff gate。
    # 比对当前 run 和上一次同 prompt_hash 的 RAGAS 指标，
    # 如果 avg_faithfulness / answer_relevancy 下降 > 阈值则 fail。
    if: github.event_name == 'pull_request'
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/readyz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      QDRANT_URL: http://localhost:6333
      # 关闭需要真实 LLM 的部分 — eval gate 只跑 structural check
      CI_SKIP_LLM_EVAL: 1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50  # 拿到 base 分支用于 diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify prompt hash tracked in git
        run: |
          python -c "from backend.generation.prompts import get_prompts_with_hash; p, h = get_prompts_with_hash(); print(f'prompt_version={p.get(\"version\")} hash={h}')"

      - name: Compare eval metrics vs main
        # 简化版：调用 scripts/eval.py，脚本内会自动做 diff_against_previous
        # 这里只 sanity check imports / DB 字段
        run: |
          python -c "
          from backend.evaluation.eval_store import get_eval_store
          from backend.generation.prompts import get_prompts_with_hash
          store = get_eval_store()
          _, ph = get_prompts_with_hash()
          print(f'eval_db={store._db_path}')
          print(f'prompt_hash={ph}')
          print('schema columns:', [r[1] for r in __import__('sqlite3').connect(str(store._db_path)).execute('PRAGMA table_info(eval_runs)').fetchall()])
          "
