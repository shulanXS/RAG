[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=backend
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-branch
    --no-cov-on-fail
    # P3.1: coverage gate
    --cov-fail-under=0
markers =
    integration: requires running Qdrant + Redis services
    slow: tests that take more than 5s
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
